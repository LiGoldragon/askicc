[package]
name = "askicc"
version = "0.16.0"
edition = "2021"
description = "askicc — bootstrap compiler: reads .synth grammar + askic's .aski anatomy, builds data-tree, derives enums"

[dependencies]
logos = "0.14"
rkyv = { version = "0.8", default-features = false, features = [
    "little_endian",
    "pointer_width_32",
    "alloc",
] }
